<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LordKrax</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* PROFILE IMAGE */
.pfp {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin-top: 80px;
    border: 3px solid #00f0ff;
    box-shadow: 0 0 20px #00f0ff;
}

/* NAME */
h1 {
    margin-top: 20px;
    font-size: 45px;
    text-shadow: 0 0 15px #00f0ff;
}

/* typing text */
.typing {
    font-size: 18px;
    color: #aaa;
    margin-top: 10px;
    height: 25px;
}

/* buttons */
.links {
    margin-top: 30px;
}

a {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border: 1px solid #00f0ff;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

a:hover {
    background: #00f0ff;
    color: black;
    box-shadow: 0 0 20px #00f0ff;
}

/* music button */
#musicBtn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    background: #111;
    color: white;
    border: 1px solid #ff00ff;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- PFP from GitHub -->
<img class="pfp" src="https://github.com/LordKrax" alt="pfp">

<h1>LordKrax</h1>

<div class="typing" id="typing"></div>

<div class="links">
    <a href="https://github.com/LordKrax" target="_blank">GitHub</a>
    <a href="https://discord.com/users/752438182343344128" target="_blank">Discord</a>
    <a href="#">Projects</a>
</div>

<!-- music -->
<button id="musicBtn">▶ Play Music</button>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_c8b6c3b8c6.mp3?filename=cyberpunk-moonlight-ambient-114199.mp3" type="audio/mp3">
</audio>

<script>
// typing effect
const text = "Discord Bots • Automation • FiveM Developer";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 60);
    }
}
typing();

// music control
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

btn.onclick = () => {
    if (music.paused) {
        music.play();
        btn.innerText = "⏸ Pause Music";
    } else {
        music.pause();
        btn.innerText = "▶ Play Music";
    }
};
</script>

</body>
</html>
