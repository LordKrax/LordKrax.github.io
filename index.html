<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LordKrax</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* glow animation */
@keyframes glow {
    0% { text-shadow: 0 0 10px #00f0ff; }
    50% { text-shadow: 0 0 25px #ff00ff; }
    100% { text-shadow: 0 0 10px #00f0ff; }
}

.container {
    margin-top: 120px;
}

h1 {
    font-size: 50px;
    animation: glow 3s infinite;
}

p {
    color: #aaa;
    margin-top: -10px;
}

/* buttons */
.links {
    margin-top: 40px;
}

a {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border: 1px solid #00f0ff;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

a:hover {
    background: #00f0ff;
    color: black;
    box-shadow: 0 0 20px #00f0ff;
}

/* floating particles */
.particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: #00f0ff;
    border-radius: 50%;
    animation: float 10s infinite linear;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- particles -->
<script>
for (let i = 0; i < 30; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.body.appendChild(p);
}
</script>

<div class="container">
    <h1>LordKrax</h1>
    <p>Discord Bot Developer | Automation | FiveM Developer</p>

    <div class="links">
        <a href="https://github.com/LordKrax" target="_blank">GitHub</a>
        <a href="https://discord.com/users/752438182343344128" target="_blank">Discord</a>
        <a href="#">Projects</a>
    </div>
</div>

</body>
</html>
