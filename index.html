<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LordKrax Dashboard</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #000;
    color: #00f0ff;
    overflow: hidden;
}

/* BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid #00f0ff;
    background: rgba(0,0,0,0.7);
}

/* GRID DASHBOARD */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

/* BOXES */
.box {
    border: 1px solid #00f0ff;
    padding: 15px;
    min-height: 200px;
    box-shadow: 0 0 10px #00f0ff;
}

/* PFP */
.pfp {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 2px solid #00f0ff;
}

/* BUTTONS */
button {
    margin: 5px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid #00f0ff;
    color: #00f0ff;
    cursor: pointer;
}

button:hover {
    background: #00f0ff;
    color: black;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TOP BAR -->
<div class="topbar">
    <div>⚡ LordKrax Dashboard</div>
    <div id="time"></div>
</div>

<!-- GRID -->
<div class="grid">

    <!-- PROFILE -->
    <div class="box">
        <img class="pfp" src="https://github.com/LordKrax.png">
        <h2>LordKrax</h2>
        <p>Discord Bots • Automation • FiveM</p>
    </div>

    <!-- TERMINAL -->
    <div class="box" id="terminal">
        > Booting system...<br>
    </div>

    <!-- GITHUB -->
    <div class="box">
        <h3>GitHub Stats</h3>
        <button onclick="loadGitHub()">Load</button>
        <p id="github"></p>
    </div>

    <!-- VISITOR -->
    <div class="box">
        <h3>Visitors</h3>
        <button onclick="visit()">Check</button>
        <p id="visits"></p>
    </div>

</div>

<script>

// ===== CLOCK =====
function updateTime() {
    document.getElementById("time").innerText =
        new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);

// ===== TERMINAL TYPE =====
const lines = [
"> Initializing modules...",
"> Loading Discord Bots...",
"> Automation engine online...",
"> FiveM framework ready...",
"> System stable ✔"
];

let i = 0;
let terminal = document.getElementById("terminal");

function type() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "<br>";
        i++;
        setTimeout(type, 500);
    }
}
type();

// ===== GITHUB API =====
async function loadGitHub() {
    let res = await fetch("https://api.github.com/users/LordKrax");
    let data = await res.json();

    document.getElementById("github").innerHTML =
        "Repos: " + data.public_repos + "<br>" +
        "Followers: " + data.followers + "<br>" +
        "Following: " + data.following;
}

// ===== VISITOR COUNT =====
function visit() {
    let v = localStorage.getItem("visits") || 0;
    v++;
    localStorage.setItem("visits", v);
    document.getElementById("visits").innerText = v;
}

// ===== BACKGROUND PARTICLES =====
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let p of particles) {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

        ctx.fillStyle = "#00f0ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
