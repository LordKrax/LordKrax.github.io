<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LordKrax OS</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00f0ff;
    overflow: hidden;
}

/* LOGIN SCREEN */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

input {
    padding: 10px;
    margin: 5px;
    background: transparent;
    border: 1px solid #00f0ff;
    color: #00f0ff;
}

button {
    padding: 8px 12px;
    background: transparent;
    border: 1px solid #00f0ff;
    color: #00f0ff;
    cursor: pointer;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #00f0ff;
}

/* NAV */
.nav {
    display: flex;
    gap: 10px;
}

/* PAGES */
.page {
    display: none;
    padding: 20px;
}

/* ACTIVE PAGE */
.active {
    display: block;
}

/* TERMINAL */
#terminal {
    border: 1px solid #00f0ff;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
}

/* CHAT */
#chatBox {
    border: 1px solid #00f0ff;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>LOGIN OS</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
    <div>⚡ LORDKrax OS</div>
    <div class="nav">
        <button onclick="openPage('home')">Home</button>
        <button onclick="openPage('projects')">Projects</button>
        <button onclick="openPage('settings')">Settings</button>
        <button onclick="openPage('about')">About</button>
    </div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="grid">

<div>
<h3>Terminal</h3>
<div id="terminal"></div>
<input id="cmd" placeholder="type command..." onkeydown="cmdEnter(event)">
</div>

<div>
<h3>Chat AI</h3>
<div id="chatBox"></div>
<input id="chatInput" placeholder="chat..." onkeydown="chatEnter(event)">
</div>

</div>

</div>

<!-- PROJECTS -->
<div id="projects" class="page">
<h2>Projects</h2>
<p>Discord Bots • Automation • FiveM</p>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<h2>Settings</h2>
<button onclick="toggleSound()">Toggle Sound</button>
</div>

<!-- ABOUT -->
<div id="about" class="page">
<h2>About</h2>
<p>Developer OS Dashboard v1</p>
</div>

<script>

/* LOGIN */
function login(){
    document.getElementById("login").style.display = "none";
    playSound();
}

/* NAV */
function openPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    playSound();
}

/* TERMINAL */
let terminal = document.getElementById("terminal");

function cmdEnter(e){
    if(e.key === "Enter"){
        let val = e.target.value;
        terminal.innerHTML += "> " + val + "<br>";

        if(val === "help"){
            terminal.innerHTML += "commands: help, time, clear<br>";
        }

        if(val === "time"){
            terminal.innerHTML += new Date() + "<br>";
        }

        if(val === "clear"){
            terminal.innerHTML = "";
        }

        playSound();
        e.target.value = "";
    }
}

/* CHAT BOT (fake AI) */
function chatEnter(e){
    if(e.key === "Enter"){
        let val = e.target.value;
        let box = document.getElementById("chatBox");

        box.innerHTML += "You: " + val + "<br>";
        box.innerHTML += "Bot: " + fakeAI(val) + "<br>";

        playSound();
        e.target.value = "";
    }
}

function fakeAI(msg){
    if(msg.includes("hi")) return "Hello 👋";
    if(msg.includes("who")) return "I am OS Assistant";
    return "I don't understand yet";
}

/* SOUND SYSTEM */
let sound = true;
function toggleSound(){
    sound = !sound;
}

function playSound(){
    if(!sound) return;
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();
}

/* FIREBASE (READY TEMPLATE) */

  apiKey: "YOUR_KEY",
  authDomain: "YOUR_APP",
  projectId: "YOUR_ID",

const app = initializeApp(firebaseConfig);
*/

/* ANALYTICS (simple demo) */
let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);

console.log("Visits:", visits);

</script>

</body>
</html>
