<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LordKrax</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00f0ff;
    font-family: monospace;
    overflow: hidden;
}

/* VIDEO BACKGROUND (optional) */
#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -5;
    opacity: 0.15;
}

/* CENTER */
.container {
    text-align: center;
    margin-top: 60px;
}

/* PFP */
.pfp {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 2px solid #00f0ff;
    box-shadow: 0 0 20px #00f0ff;
}

/* TERMINAL BOX */
.terminal {
    margin: auto;
    margin-top: 20px;
    width: 70%;
    padding: 20px;
    border: 1px solid #00f0ff;
    text-align: left;
    min-height: 150px;
    box-shadow: 0 0 15px #00f0ff;
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 10px 15px;
    background: transparent;
    border: 1px solid #00f0ff;
    color: #00f0ff;
    cursor: pointer;
}

button:hover {
    background: #00f0ff;
    color: black;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND (optional - replace link) -->
<!--
<video autoplay muted loop id="bgVideo">
    <source src="YOUR_VIDEO.mp4" type="video/mp4">
</video>
-->

<div class="container">

    <img class="pfp" src="https://github.com/LordKrax.png">

    <h1>LordKrax</h1>

    <div class="terminal" id="terminal"></div>

    <button onclick="loadGitHub()">GitHub Stats</button>
    <button onclick="visitorCount()">Visitor Count</button>

    <p id="stats"></p>

</div>

<script>

// ===== TERMINAL TYPE EFFECT =====
const lines = [
"> Initializing system...",
"> Loading profile...",
"> Discord Bots Developer",
"> Automation Systems Online",
"> FiveM Framework Ready"
];

let i = 0;
let terminal = document.getElementById("terminal");

function typeLine() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "<br>";
        i++;
        setTimeout(typeLine, 600);
    }
}
typeLine();

// ===== GITHUB API =====
async function loadGitHub() {
    let res = await fetch("https://api.github.com/users/LordKrax");
    let data = await res.json();

    document.getElementById("stats").innerHTML =
        "Repos: " + data.public_repos + "<br>" +
        "Followers: " + data.followers + "<br>" +
        "Following: " + data.following;
}

// ===== VISITOR COUNT (simple local) =====
function visitorCount() {
    let count = localStorage.getItem("visits") || 0;
    count++;
    localStorage.setItem("visits", count);
    document.getElementById("stats").innerHTML =
        "Visits: " + count;
}

</script>

</body>
</html>
