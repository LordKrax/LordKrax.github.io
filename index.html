<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LordKrax</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: white;
    overflow: hidden;
}

/* LOADING SCREEN */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.loader {
    border: 3px solid #222;
    border-top: 3px solid #00f0ff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0); }
    100% { transform: rotate(360deg); }
}

/* BACKGROUND CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* MAIN */
.container {
    text-align: center;
    margin-top: 80px;
    transition: transform 0.1s;
}

.pfp {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #00f0ff;
    box-shadow: 0 0 20px #00f0ff;
    object-fit: cover;
}

h1 {
    text-shadow: 0 0 15px #00f0ff;
}

/* BUTTONS */
a, button {
    margin: 10px;
    padding: 12px 20px;
    border: 1px solid #00f0ff;
    background: transparent;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.2s;
}

a:hover, button:hover {
    background: #00f0ff;
    color: black;
    box-shadow: 0 0 20px #00f0ff;
}

/* typing */
.typing {
    color: #aaa;
    height: 20px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
</div>

<!-- BACKGROUND -->
<canvas id="bg"></canvas>

<!-- CONTENT -->
<div class="container" id="content">
    <img class="pfp" src="https://github.com/LordKrax.png">

    <h1>LordKrax</h1>
    <div class="typing" id="typing"></div>

    <div>
        <a onclick="clickSound()" href="https://github.com/LordKrax">GitHub</a>
        <a onclick="clickSound()" href="https://discord.com/users/752438182343344128">Discord</a>
        <button onclick="toggleMusic(); clickSound()">Music</button>
    </div>
</div>

<audio id="music" loop>
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kai_Engel/Impulses/Kai_Engel_-_07_-_Moonlight_Reprise.mp3">
</audio>

<audio id="click">
    <source src="https://www.myinstants.com/media/sounds/mouse-click.mp3">
</audio>

<script>
// LOADING SCREEN
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
}, 1500);

// TYPING
const text = "Discord Bots • Automation • FiveM Developer";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text[i++];
        setTimeout(type, 50);
    }
}
type();

// MUSIC
let music = document.getElementById("music");
function toggleMusic() {
    if (music.paused) music.play();
    else music.pause();
}

// CLICK SOUND
function clickSound() {
    document.getElementById("click").currentTime = 0;
    document.getElementById("click").play();
}

// 3D EFFECT
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.pageX) / 25;
    let y = (window.innerHeight / 2 - e.pageY) / 25;
    document.querySelector(".container").style.transform =
        `rotateY(${x}deg) rotateX(${y}deg)`;
});

// PARTICLES BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let p of particles) {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

        ctx.fillStyle = "#00f0ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
